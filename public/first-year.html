<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>First Year Papers</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND */

body{
margin:0;
min-height:100vh;
background: radial-gradient(circle at 20% 30%, #0f2a66, #050b1f 60%);
font-family:'Segoe UI',sans-serif;
color:white;
}

/* BACK BUTTON */

.back-button{
position:absolute;
top:30px;
left:30px;
background:linear-gradient(45deg,#4e8cff,#2f6fff);
color:white;
border:none;
padding:10px 22px;
border-radius:30px;
}

/* MAIN */

.main-wrapper{
margin-top:150px;
}

h2{
margin-bottom:40px;
}

/* GLASS BOX */

.glass-box{
background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
border-radius:20px;
padding:50px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

/* CUSTOM SELECT */

.custom-select{
position:relative;
margin-bottom:25px;
cursor:pointer;
}

.select-box{
padding:12px 20px;
border-radius:8px;
background:#e6e6e6;
color:#333;
font-weight:500;
}

/* DROPDOWN OPTIONS */

.options{
position:absolute;
width:100%;
background:white;
color:black;
border-radius:8px;
margin-top:5px;
overflow-y:auto;
max-height:0;
transition:max-height 0.3s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:100;
}

/* SCROLLBAR STYLE */

.options::-webkit-scrollbar{
width:6px;
}

.options::-webkit-scrollbar-thumb{
background:#2f6fff;
border-radius:10px;
}

.options div{
padding:12px 20px;
}

.options div:hover{
background:#2f6fff;
color:white;
}

.custom-select.active .options{
max-height:300px;
}

/* BUTTON */

.btn-show{
background:linear-gradient(45deg,#4e8cff,#2f6fff);
border:none;
padding:10px 28px;
border-radius:8px;
color:white;
}

/* GLOW LINE */

.glow-line{
height:6px;
width:80%;
margin:60px auto;
border-radius:50px;
background:linear-gradient(90deg,transparent,rgba(79,140,255,0.5),transparent);
}

/* PAPER CARDS */

.paper-card{
opacity:0;
transform:translateY(30px);
animation:fadeUp 0.6s forwards;
margin-bottom:10px;
}

.paper-card a{
display:block;
background:rgba(255,255,255,0.08);
color:white;
padding:25px;
border-radius:10px;
text-align:center;
text-decoration:none;
}

.paper-card a:hover{
background:rgba(79,140,255,0.3);
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<button class="back-button" onclick="history.back()">← Back</button>

<div class="container text-center main-wrapper">

<h2>First Year - Select Options</h2>

<div class="glass-box col-md-8 mx-auto">

<!-- SEMESTER -->

<div class="custom-select" id="semesterSelect">
<div class="select-box">Select Semester</div>
<div class="options">
<div data-value="1">Semester 1</div>
<div data-value="2">Semester 2</div>
</div>
</div>

<!-- COURSE -->

<div class="custom-select" id="courseSelect">
<div class="select-box">Select Course</div>
<div class="options">
<div data-value="CSE">CSE</div>
<div data-value="ECE">ECE</div>
<div data-value="MECH">MECH</div>
<div data-value="CIVIL">CIVIL</div>
<div data-value="CHEMICAL">CHEMICAL</div>
</div>
</div>

<!-- REGULATION -->

<div class="custom-select" id="regulationSelect">
<div class="select-box">Select Regulation</div>
<div class="options">
<div data-value="R20">R20</div>
<div data-value="R24">R24</div>
</div>
</div>

<button class="btn-show mt-3" onclick="filterPapers()">Show Papers</button>

</div>

<div class="glow-line"></div>

<div id="papersList" class="row g-4 mt-4 justify-content-center"></div>

</div>

<script>

let semesterValue="";
let courseValue="";
let regulationValue="";

/* DROPDOWN LOGIC */

document.querySelectorAll(".custom-select").forEach(select=>{

const box=select.querySelector(".select-box");
const options=select.querySelector(".options");

box.addEventListener("click",()=>{
document.querySelectorAll(".custom-select").forEach(s=>s.classList.remove("active"));
select.classList.toggle("active");
});

options.querySelectorAll("div").forEach(option=>{

option.addEventListener("click",()=>{

box.textContent=option.textContent;
select.classList.remove("active");

if(select.id==="semesterSelect"){
semesterValue=option.dataset.value;
}
else if(select.id==="courseSelect"){
courseValue=option.dataset.value;
}
else{
regulationValue=option.dataset.value;
}

});

});

});

document.addEventListener("click",function(e){
if(!e.target.closest(".custom-select")){
document.querySelectorAll(".custom-select").forEach(s=>s.classList.remove("active"));
}
});

/* PAPERS DATABASE */

const papers=[

{subject:"Maths",sem:"1",course:"CSE",reg:"R20",file:"#"},
{subject:"Physics",sem:"1",course:"CSE",reg:"R20",file:"#"},
{subject:"Chemistry",sem:"1",course:"CHEMICAL",reg:"R20",file:"#"},
{subject:"Engineering Drawing",sem:"1",course:"MECH",reg:"R20",file:"#"},
{subject:"Basic Electrical",sem:"1",course:"ECE",reg:"R20",file:"#"},
{subject:"Mechanics",sem:"1",course:"CIVIL",reg:"R20",file:"#"},
{subject:"Maths",sem:"1",course:"CSE",reg:"R24",file:"#"},
{subject:"Physics",sem:"1",course:"ECE",reg:"R24",file:"#"},
{subject:"Chemistry",sem:"2",course:"CHEMICAL",reg:"R24",file:"#"},
{subject:"Workshop",sem:"2",course:"MECH",reg:"R24",file:"#"}

];

/* FILTER PAPERS */

function filterPapers(){

const container=document.getElementById("papersList");
container.innerHTML="";

if(!semesterValue || !courseValue || !regulationValue){
container.innerHTML="<p>Please select Semester, Course and Regulation.</p>";
return;
}

const filtered=papers.filter(p =>
p.sem===semesterValue &&
p.course===courseValue &&
p.reg===regulationValue
);

filtered.forEach((paper,index)=>{

const card=document.createElement("div");
card.className="col-12 col-sm-6 col-md-4 paper-card";
card.style.animationDelay=`${index*0.15}s`;

card.innerHTML=`
<a href="${paper.file}">
${paper.subject}
</a>
`;

container.appendChild(card);

});

}

</script>

</body>
</html>
