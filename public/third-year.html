<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Third Year Papers</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #0f2a66, #050b1f 60%);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* ===== BACK BUTTON ===== */
.back-button {
    position: absolute;
    top: 30px;
    left: 30px;
    background: linear-gradient(45deg, #4e8cff, #2f6fff);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 30px;
    font-weight: 500;
    transition: 0.3s ease;
}

.back-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(79,140,255,0.4);
}

/* ===== MAIN SECTION ===== */
.main-wrapper {
    margin-top: 150px;
}

/* ===== TITLE ===== */
h2 {
    font-weight: 500;
    letter-spacing: 1px;
    margin-bottom: 40px;
}

/* ===== GLASS CONTAINER ===== */
.glass-box {
    background: linear-gradient(
        135deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );
    border-radius: 20px;
    padding: 50px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* ===== DROPDOWN ===== */
.custom-select {
    position: relative;
    margin-bottom: 30px;
    cursor: pointer;
}

.select-box {
    padding: 12px 20px;
    border-radius: 8px;
    background: #e6e6e6;
    color: #333;
    font-weight: 500;
    transition: 0.3s;
}

.select-box:hover {
    background: white;
}

/* Dropdown list */
.options {
    position: absolute;
    width: 100%;
    background: white;
    color: black;
    border-radius: 8px;
    margin-top: 5px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    z-index: 100;
}

.options div {
    padding: 12px 20px;
    transition: 0.2s;
}

.options div:hover {
    background: #2f6fff;
    color: white;
}

.custom-select.active .options {
    max-height: 200px;
}

/* ===== BUTTON ===== */
.btn-show {
    background: linear-gradient(45deg, #4e8cff, #2f6fff);
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

.btn-show:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(79,140,255,0.5);
}

/* ===== GLOW LINE ===== */
.glow-line {
    height: 6px;
    width: 80%;
    margin: 60px auto;
    border-radius: 50px;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(79,140,255,0.5),
        transparent
    );
}

/* ===== PAPER CARDS ===== */
.paper-card {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.6s ease forwards;
}

.paper-card a {
    display: block;
    background: rgba(255,255,255,0.08);
    color: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    text-decoration: none;
    transition: 0.3s;
}

.paper-card a:hover {
    background: rgba(79,140,255,0.3);
    transform: translateY(-5px);
}

/* Animation */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.paper-card {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.6s ease forwards;
    margin-bottom: 10px;
}

#papersList {
    overflow: hidden;
}

</style>
</head>
<body>

<button class="back-button" onclick="history.back()">← Back</button>

<div class="container text-center main-wrapper">

<h2>Third Year - Select Semester & Exam</h2>

<div class="glass-box col-md-8 mx-auto">

<div class="custom-select" id="semesterSelect">
    <div class="select-box">Select Semester</div>
    <div class="options">
        <div data-value="1">Semester 1</div>
        <div data-value="2">Semester 2</div>
    </div>
</div>

<div class="custom-select" id="examSelect">
    <div class="select-box">Select Exam Type</div>
    <div class="options">
        <div data-value="mid1">Mid 1</div>
        <div data-value="mid2">Mid 2</div>
        <div data-value="semester">Semester Exam</div>
    </div>
</div>

<button class="btn-show mt-3" onclick="filterPapers()">Show Papers</button>

</div>

<div class="glow-line"></div>

<div id="papersList" class="row g-4 mt-4 justify-content-center"></div>
</div>

<script>

let semesterValue = "";
let examValue = "";

document.querySelectorAll(".custom-select").forEach(select => {

    const box = select.querySelector(".select-box");
    const options = select.querySelector(".options");

    box.addEventListener("click", () => {
        document.querySelectorAll(".custom-select").forEach(s => s.classList.remove("active"));
        select.classList.toggle("active");
    });

    options.querySelectorAll("div").forEach(option => {
        option.addEventListener("click", () => {

            box.textContent = option.textContent;
            select.classList.remove("active");

            if(select.id === "semesterSelect"){
                semesterValue = option.dataset.value;
            } else {
                examValue = option.dataset.value;
            }
        });
    });
});

document.addEventListener("click", function(e){
    if(!e.target.closest(".custom-select")){
        document.querySelectorAll(".custom-select").forEach(s => s.classList.remove("active"));
    }
});

/* Sample Papers */
const papers = [
  { subject: "Maths", sem: "1", mid: "mid1", file: "#" },
  { subject: "Physics", sem: "1", mid: "mid1", file: "#" },
  { subject: "English", sem: "2", mid: "semester", file: "#" }
];

function filterPapers() {

  const container = document.getElementById("papersList");
  container.innerHTML = "";

  if (!semesterValue || !examValue) {
    container.innerHTML = "<p>Please select Semester and Exam type.</p>";
    return;
  }

  const filtered = papers.filter(p => p.sem === semesterValue && p.mid === examValue);

  filtered.forEach((paper, index) => {

    const card = document.createElement("div");
    card.className = "col-12 col-sm-6 col-md-4 paper-card";
    card.style.animationDelay = `${index * 0.15}s`;

    card.innerHTML = `
        <a href="${paper.file}">
            ${paper.subject}
        </a>
    `;

    container.appendChild(card);
  });
}

</script>

</body>
</html>
